name: Build Pick-Me-Up Game

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Memungkinkan tombol run manual dari GitHub

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install PyInstaller
      run: pip install pyinstaller

    - name: Build Windows Executable
      run: pyinstaller --name "Pick-Me-Up" --console main.py

    - name: Prepare Windows Distribution Folder
      run: |
        Copy-Item -Path "data" -Destination "dist/Pick-Me-Up/data" -Recurse

    - name: Upload Windows Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Pick-Me-Up-Windows
        path: dist/Pick-Me-Up/

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install PyInstaller
      run: pip install pyinstaller

    - name: Build Linux Binary
      run: pyinstaller --name "Pick-Me-Up" --console main.py

    - name: Prepare Linux Distribution Folder
      run: |
        cp -r data dist/Pick-Me-Up/data

    - name: Upload Linux Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Pick-Me-Up-Linux
        path: dist/Pick-Me-Up/
